<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Security: CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn-icons-png.flaticon.com https://static.exercisedb.dev; connect-src 'self' https://assets.mixkit.co;">

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    
    <title>StrongLog Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="min-h-screen pb-32">

    <!-- Update Toast -->
    <div id="update-toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[500] glass p-4 px-6 flex items-center gap-4 border-[#00FF9D]/30 hidden animate-fade">
        <span class="text-xs font-black uppercase tracking-widest text-white">Nova VersÃ£o DisponÃ­vel</span>
        <button onclick="window.location.reload()" class="bg-[#00FF9D] text-black text-[10px] font-black p-2 px-4 rounded-full uppercase italic">Atualizar</button>
    </div>

    <header class="p-6 pb-2 flex justify-between items-center sticky top-0 bg-[#0a0a0a]/95 backdrop-blur-xl z-[100] border-b border-white/5">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter">STRONG<span class="text-[#00FF9D]">LOG</span></h1>
            <p id="current-date" class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em]"></p>
        </div>
        <div class="flex gap-3">
            <button onclick="app.toggleSettings()" class="p-3 glass"><i data-lucide="settings-2" class="w-5 h-5 text-gray-400"></i></button>
        </div>
    </header>

    <main id="app-container" class="px-4 py-4 space-y-8">
        <!-- Dashboard -->
        <section id="view-dashboard" class="space-y-8 animate-fade">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass p-6 space-y-5">
                    <div class="flex justify-between items-center">
                        <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Volume Semanal</h2>
                        <span id="weekly-total" class="text-xs font-black text-[#00FF9D] bg-[#00FF9D]/10 px-3 py-1 rounded-full">-- kg</span>
                    </div>
                    <div class="h-32 w-full"><canvas id="volumeChart"></canvas></div>
                </div>

                <div class="glass p-6 space-y-5">
                    <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">DistribuiÃ§Ã£o por MÃºsculo</h2>
                    <div class="h-32 w-full"><canvas id="muscleGroupChart"></canvas></div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-lg font-black tracking-tight uppercase italic text-white">Minhas Rotinas</h2>
                    <div class="flex gap-2">
                        <button onclick="app.showRecords()" class="p-2 glass text-[#00FF9D]"><i data-lucide="trophy" class="w-4 h-4"></i></button>
                        <button onclick="app.showPlanEditor()" class="text-[9px] font-black text-black bg-[#00FF9D] px-4 py-2 rounded-full uppercase tracking-tighter">Novo Plano</button>
                    </div>
                </div>
                <div id="workout-list" class="grid grid-cols-1 gap-3"></div>
            </div>
        </section>

        <!-- Live Workout -->
        <section id="view-active-workout" class="hidden space-y-6 animate-fade">
            <div class="flex items-center justify-between sticky top-[80px] bg-[#0a0a0a] py-3 z-50">
                <div class="flex flex-col">
                    <h2 id="active-workout-name" class="text-2xl font-black tracking-tighter italic text-white">--</h2>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-[#00FF9D] rounded-full animate-pulse"></span>
                        <span id="timer-display" class="text-xs font-mono text-gray-400 font-bold tracking-widest uppercase">00:00:00</span>
                    </div>
                </div>
                <button onclick="app.cancelWorkout()" class="p-3 glass text-red-500 active:bg-red-500/10"><i data-lucide="power"></i></button>
            </div>
            <div id="exercise-list" class="space-y-6"></div>
            <div class="space-y-3 pt-8 pb-10">
                <button onclick="app.showExerciseLibrary('workout')" class="w-full py-5 glass text-gray-500 text-[10px] font-black tracking-[0.2em] border-dashed border-2 border-white/5 uppercase">+ Injetar ExercÃ­cio</button>
                <button onclick="app.finishWorkout()" class="w-full btn-accent p-6 rounded-[24px] text-sm tracking-[0.2em] uppercase">Finalizar SessÃ£o</button>
            </div>
        </section>

        <!-- History -->
        <section id="view-history" class="hidden space-y-6 animate-fade">
            <h2 class="text-2xl font-black italic tracking-tighter uppercase px-1 text-white">HistÃ³rico</h2>
            <div id="history-list" class="space-y-3 pb-10"></div>
        </section>

        <!-- Plan Editor -->
        <section id="view-plan-editor" class="hidden space-y-6 animate-fade">
            <div class="flex items-center gap-4">
                <button onclick="app.setView('dashboard')" class="p-3 glass"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                <h2 id="plan-editor-title" class="text-2xl font-black italic text-white">Novo Plano</h2>
            </div>
            <div class="space-y-8">
                <div class="space-y-3 px-1">
                    <label class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em]">Nome da Rotina</label>
                    <input id="plan-name-input" type="text" class="w-full glass p-5 font-bold text-white focus:outline-none" placeholder="Ex: Treino A">
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] px-1 text-white">ExercÃ­cios</label>
                    <div id="selected-exercises-list" class="space-y-2"></div>
                    <button onclick="app.showExerciseLibrary('editor')" class="w-full py-5 border-2 border-dashed border-white/5 rounded-[22px] text-gray-600 font-black text-[10px] tracking-widest uppercase active:bg-white/5">+ Buscar na Biblioteca</button>
                </div>
                <button onclick="app.savePlan()" class="w-full btn-accent p-6 rounded-[22px] text-xs tracking-[0.3em]">SALVAR ROTINA</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass p-2 flex justify-around items-center z-[150] shadow-2xl shadow-black ring-1 ring-white/5">
        <button onclick="app.setView('dashboard')" class="nav-item p-4" data-view="dashboard"><i data-lucide="layout-grid"></i></button>
        <button onclick="app.setView('active-workout')" class="nav-item p-4" data-view="active-workout"><i data-lucide="dumbbell"></i></button>
        <button onclick="app.setView('history')" class="nav-item p-4" data-view="history"><i data-lucide="calendar"></i></button>
    </nav>

    <!-- Modals -->
    <div id="records-modal" class="fixed inset-0 z-[300] bg-black/95 backdrop-blur-xl hidden">
        <div class="absolute bottom-0 left-0 right-0 glass h-[85vh] rounded-t-[45px] p-8 space-y-6 flex flex-col shadow-2xl border-white/10">
            <div class="flex justify-between items-center text-white">
                <h2 class="text-3xl font-black italic tracking-tighter uppercase">Hall of Fame</h2>
                <button onclick="app.closeModal('records-modal')" class="p-3 glass"><i data-lucide="x"></i></button>
            </div>
            <div id="records-list" class="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-2 pb-20"></div>
        </div>
    </div>

    <div id="exercise-library-modal" class="fixed inset-0 z-[300] bg-black/95 backdrop-blur-xl hidden">
        <div class="absolute bottom-0 left-0 right-0 glass h-[92vh] rounded-t-[45px] p-8 space-y-6 flex flex-col shadow-2xl border-white/10">
            <div class="flex justify-between items-center text-white">
                <h2 class="text-3xl font-black italic tracking-tighter uppercase">Biblioteca</h2>
                <button onclick="app.closeModal('exercise-library-modal')" class="p-3 glass"><i data-lucide="x"></i></button>
            </div>
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                    <input id="search-exercise" type="text" oninput="app.filterExerciseLibrary()" class="w-full bg-white/5 p-5 pl-14 rounded-2xl focus:outline-none font-bold text-sm text-white" placeholder="Pesquisar por nome ou músculo...">
                </div>
                <button onclick="app.showCustomExerciseForm()" class="p-5 glass text-[#00FF9D] active:bg-[#00FF9D]/10"><i data-lucide="plus"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <select id="filter-body-part" onchange="app.filterExerciseLibrary()" class="bg-[#111] border border-white/5 p-4 rounded-xl focus:outline-none text-xs font-bold text-gray-300 appearance-none">
                    <option value="" class="bg-[#0a0a0a] text-white">Todos os Músculos</option>
                    <option value="Braços" class="bg-[#0a0a0a] text-white">Braços</option>
                    <option value="Antebraços" class="bg-[#0a0a0a] text-white">Antebraços</option>
                    <option value="Costas" class="bg-[#0a0a0a] text-white">Costas</option>
                    <option value="Peito" class="bg-[#0a0a0a] text-white">Peito</option>
                    <option value="Ombros" class="bg-[#0a0a0a] text-white">Ombros</option>
                    <option value="Pernas" class="bg-[#0a0a0a] text-white">Pernas</option>
                    <option value="Panturrilhas" class="bg-[#0a0a0a] text-white">Panturrilhas</option>
                    <option value="Cintura" class="bg-[#0a0a0a] text-white">Cintura/Abdômen</option>
                    <option value="Cardio" class="bg-[#0a0a0a] text-white">Cardio</option>
                    <option value="Pescoço" class="bg-[#0a0a0a] text-white">Pescoço</option>
                </select>
                <select id="filter-equipment" onchange="app.filterExerciseLibrary()" class="bg-[#111] border border-white/5 p-4 rounded-xl focus:outline-none text-xs font-bold text-gray-300 appearance-none">
                    <option value="" class="bg-[#0a0a0a] text-white">Equipamentos (Todos)</option>
                    <option value="Peso Corporal" class="bg-[#0a0a0a] text-white">Peso Corporal</option>
                    <option value="Halter" class="bg-[#0a0a0a] text-white">Halter</option>
                    <option value="Barra" class="bg-[#0a0a0a] text-white">Barra</option>
                    <option value="Cabo" class="bg-[#0a0a0a] text-white">Cabo/Polia</option>
                    <option value="Máquina" class="bg-[#0a0a0a] text-white">Máquina</option>
                    <option value="Elástico" class="bg-[#0a0a0a] text-white">Elástico</option>
                    <option value="Smith" class="bg-[#0a0a0a] text-white">Smith</option>
                    <option value="Kettlebell" class="bg-[#0a0a0a] text-white">Kettlebell</option>
                    <option value="Barra W" class="bg-[#0a0a0a] text-white">Barra W</option>
                </select>
            </div>
            <div id="library-list" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-2 pb-20"></div>
        </div>
    </div>
    
    <!-- Exercise Detail Modal -->
    <div id="exercise-detail-modal" class="fixed inset-0 z-[400] bg-black/95 backdrop-blur-xl hidden text-white">
        <div class="absolute bottom-0 left-0 right-0 glass h-[92vh] rounded-t-[45px] p-8 space-y-6 flex flex-col shadow-2xl border-white/10">
            <div class="flex justify-between items-center">
                <span class="text-[9px] text-[#00FF9D] font-black uppercase tracking-[0.2em]" id="detail-exercise-category">CATEGORIA</span>
                <button onclick="app.closeModal('exercise-detail-modal')" class="p-3 glass"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-2">
                <h2 id="detail-exercise-name" class="text-2xl font-black italic tracking-tighter uppercase leading-tight text-white">--</h2>
                <div class="flex flex-wrap gap-2 animate-fade" id="detail-exercise-tags">
                    <!-- Tags de Equipamento e Músculo Alvo virão aqui -->
                </div>
            </div>

            <!-- GIF de Execução -->
            <div class="w-full h-48 bg-white/5 rounded-2xl overflow-hidden flex items-center justify-center border border-white/5 relative">
                <div id="detail-gif-loading" class="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-10">
                    <div class="w-8 h-8 border-4 border-[#00FF9D]/30 border-t-[#00FF9D] rounded-full animate-spin"></div>
                </div>
                <img id="detail-exercise-gif" src="" alt="Execução do exercício" class="h-full w-auto object-contain hidden" onload="document.getElementById('detail-gif-loading').classList.add('hidden'); this.classList.remove('hidden');" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2964/2964514.png'; document.getElementById('detail-gif-loading').classList.add('hidden'); this.classList.remove('hidden');">
            </div>

            <!-- Instruções -->
            <div class="flex-1 overflow-y-auto space-y-4 custom-scrollbar pr-2 pb-10">
                <div>
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] text-gray-500 mb-2">Como Executar</h3>
                    <ol id="detail-exercise-steps" class="space-y-3 list-decimal list-inside text-sm text-gray-300 font-medium leading-relaxed">
                        <!-- Passos da instrução virão aqui -->
                    </ol>
                </div>
                <div id="detail-secondary-muscles-container" class="hidden">
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] text-gray-500 mb-2">Músculos Secundários</h3>
                    <p id="detail-exercise-secondary" class="text-xs text-gray-400 font-bold uppercase tracking-wide"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[300] bg-black/95 backdrop-blur-xl hidden text-white">
        <div class="flex items-center justify-center min-h-screen p-6">
            <div class="glass w-full max-w-sm p-10 space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-3xl font-black italic tracking-tighter">AJUSTES</h2>
                    <button onclick="app.closeModal('settings-modal')" class="p-3 glass"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-3">
                    <button onclick="app.showExerciseManager()" class="w-full p-5 glass flex items-center gap-4 text-xs font-black uppercase active:bg-white/5">
                        <i data-lucide="library" class="w-5 h-5 text-gray-400"></i> Gerenciar Biblioteca
                    </button>
                    <button onclick="app.exportData()" class="w-full p-5 glass flex items-center gap-4 text-xs font-black uppercase active:bg-white/5">
                        <i data-lucide="database" class="w-5 h-5 text-[#00FF9D]"></i> Exportar Backup
                    </button>
                    <button onclick="app.importDataTrigger()" class="w-full p-5 glass flex items-center gap-4 text-xs font-black uppercase active:bg-white/5">
                        <i data-lucide="refresh-cw" class="w-5 h-5 text-[#00FF9D]"></i> Importar Backup
                    </button>
                    <input type="file" id="import-input" class="hidden" accept=".json" onchange="app.importData(event)">
                    <button onclick="app.clearAllData()" class="w-full p-5 glass text-red-500 text-[10px] font-black uppercase tracking-widest border-red-500/10 active:bg-red-500/10">Limpar todo o App</button>
                </div>
                <p class="text-[9px] text-center text-gray-700 font-bold tracking-[0.4em]">STRONGLOG PRO PWA v4.2</p>
            </div>
        </div>
    </div>

    <!-- Rest Overlay -->
    <div id="rest-timer-overlay" class="fixed top-24 right-6 translate-x-[200%] transition-transform duration-500 glass p-6 flex items-center gap-6 z-[200] shadow-2xl border-[#00FF9D]/20">
        <div class="flex flex-col">
            <span class="text-[9px] text-[#00FF9D] font-black uppercase tracking-[0.2em]">Descanso</span>
            <div class="text-4xl font-mono font-black italic text-white" id="overlay-timer">01:30</div>
        </div>
        <button onclick="app.stopRestTimer()" class="text-red-500 glass p-4 active:bg-red-500/10"><i data-lucide="circle-stop" class="w-6 h-6"></i></button>
    </div>

    <script src="./app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Security: CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn-icons-png.flaticon.com; connect-src 'self' https://assets.mixkit.co;">

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    
    <title>StrongLog Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        :root { --bg: #0a0a0a; --accent: #00ff41; --glass: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #efefef; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 22px; }
        .btn-accent { background: var(--accent); color: #000; font-weight: 900; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 8px 30px rgba(0, 255, 65, 0.15); }
        .btn-accent:active { transform: scale(0.94); opacity: 0.8; }
        .nav-item.active { color: var(--accent); transform: translateY(-3px); text-shadow: 0 0 10px rgba(0, 255, 65, 0.3); }
        input[type="number"] { -moz-appearance: textfield; background: transparent; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 24px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        #update-toast { box-shadow: 0 0 50px rgba(0,255,65,0.2); }
    </style>
</head>
<body class="min-h-screen pb-32">

    <!-- Update Toast -->
    <div id="update-toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[500] glass p-4 px-6 flex items-center gap-4 border-[#00ff41]/30 hidden animate-fade">
        <span class="text-xs font-black uppercase tracking-widest text-white">Nova Versão Disponível</span>
        <button onclick="window.location.reload()" class="bg-[#00ff41] text-black text-[10px] font-black p-2 px-4 rounded-full uppercase italic">Atualizar</button>
    </div>

    <header class="p-6 pb-2 flex justify-between items-center sticky top-0 bg-[#0a0a0a]/95 backdrop-blur-xl z-[100] border-b border-white/5">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter">STRONG<span class="text-[#00ff41]">LOG</span></h1>
            <p id="current-date" class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em]"></p>
        </div>
        <div class="flex gap-3">
            <button onclick="app.toggleSettings()" class="p-3 glass"><i data-lucide="settings-2" class="w-5 h-5 text-gray-400"></i></button>
        </div>
    </header>

    <main id="app-container" class="px-4 py-4 space-y-8">
        <!-- Dashboard -->
        <section id="view-dashboard" class="space-y-8 animate-fade">
            <div class="glass p-6 space-y-5">
                <div class="flex justify-between items-center">
                    <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Performance Semanal</h2>
                    <span id="weekly-total" class="text-xs font-black text-[#00ff41] bg-[#00ff41]/10 px-3 py-1 rounded-full">-- kg</span>
                </div>
                <div class="h-32 w-full"><canvas id="volumeChart"></canvas></div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-lg font-black tracking-tight uppercase italic text-white">Minhas Rotinas</h2>
                    <button onclick="app.showPlanEditor()" class="text-[9px] font-black text-black bg-[#00ff41] px-4 py-2 rounded-full uppercase tracking-tighter">Novo Plano</button>
                </div>
                <div id="workout-list" class="grid grid-cols-1 gap-3"></div>
            </div>
        </section>

        <!-- Live Workout -->
        <section id="view-active-workout" class="hidden space-y-6 animate-fade">
            <div class="flex items-center justify-between sticky top-[80px] bg-[#0a0a0a] py-3 z-50">
                <div class="flex flex-col">
                    <h2 id="active-workout-name" class="text-2xl font-black tracking-tighter italic text-white">--</h2>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-[#00ff41] rounded-full animate-pulse"></span>
                        <span id="timer-display" class="text-xs font-mono text-gray-400 font-bold tracking-widest uppercase">00:00:00</span>
                    </div>
                </div>
                <button onclick="app.cancelWorkout()" class="p-3 glass text-red-500 active:bg-red-500/10"><i data-lucide="power"></i></button>
            </div>
            <div id="exercise-list" class="space-y-6"></div>
            <div class="space-y-3 pt-8 pb-10">
                <button onclick="app.showExerciseLibrary('workout')" class="w-full py-5 glass text-gray-500 text-[10px] font-black tracking-[0.2em] border-dashed border-2 border-white/5 uppercase">+ Injetar Exercício</button>
                <button onclick="app.finishWorkout()" class="w-full btn-accent p-6 rounded-[24px] text-sm tracking-[0.2em] uppercase">Finalizar Sessão</button>
            </div>
        </section>

        <!-- History -->
        <section id="view-history" class="hidden space-y-6 animate-fade">
            <h2 class="text-2xl font-black italic tracking-tighter uppercase px-1 text-white">Histórico</h2>
            <div id="history-list" class="space-y-3 pb-10"></div>
        </section>

        <!-- Plan Editor -->
        <section id="view-plan-editor" class="hidden space-y-6 animate-fade">
            <div class="flex items-center gap-4">
                <button onclick="app.setView('dashboard')" class="p-3 glass"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                <h2 id="plan-editor-title" class="text-2xl font-black italic text-white">Novo Plano</h2>
            </div>
            <div class="space-y-8">
                <div class="space-y-3 px-1">
                    <label class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em]">Nome da Rotina</label>
                    <input id="plan-name-input" type="text" class="w-full glass p-5 font-bold text-white focus:outline-none" placeholder="Ex: Treino A">
                </div>
                <div class="space-y-4">
                    <label class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] px-1 text-white">Exercícios</label>
                    <div id="selected-exercises-list" class="space-y-2"></div>
                    <button onclick="app.showExerciseLibrary('editor')" class="w-full py-5 border-2 border-dashed border-white/5 rounded-[22px] text-gray-600 font-black text-[10px] tracking-widest uppercase active:bg-white/5">+ Buscar na Biblioteca</button>
                </div>
                <button onclick="app.savePlan()" class="w-full btn-accent p-6 rounded-[22px] text-xs tracking-[0.3em]">SALVAR ROTINA</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass p-2 flex justify-around items-center z-[150] shadow-2xl shadow-black ring-1 ring-white/5">
        <button onclick="app.setView('dashboard')" class="nav-item p-4" data-view="dashboard"><i data-lucide="layout-grid"></i></button>
        <button onclick="app.setView('active-workout')" class="nav-item p-4" data-view="active-workout"><i data-lucide="dumbbell"></i></button>
        <button onclick="app.setView('history')" class="nav-item p-4" data-view="history"><i data-lucide="calendar"></i></button>
    </nav>

    <!-- Modals -->
    <div id="exercise-library-modal" class="fixed inset-0 z-[300] bg-black/95 backdrop-blur-xl hidden">
        <div class="absolute bottom-0 left-0 right-0 glass h-[92vh] rounded-t-[45px] p-8 space-y-6 flex flex-col shadow-2xl border-white/10">
            <div class="flex justify-between items-center text-white">
                <h2 class="text-3xl font-black italic tracking-tighter uppercase">Biblioteca</h2>
                <button onclick="app.closeModal('exercise-library-modal')" class="p-3 glass"><i data-lucide="x"></i></button>
            </div>
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                    <input id="search-exercise" type="text" oninput="app.filterExerciseLibrary()" class="w-full bg-white/5 p-5 pl-14 rounded-2xl focus:outline-none font-bold text-sm text-white" placeholder="Pesquisar...">
                </div>
                <button onclick="app.showCustomExerciseForm()" class="p-5 glass text-[#00ff41] active:bg-[#00ff41]/10"><i data-lucide="plus"></i></button>
            </div>
            <div id="library-list" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-2 pb-20"></div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[300] bg-black/95 backdrop-blur-xl hidden text-white">
        <div class="flex items-center justify-center min-h-screen p-6">
            <div class="glass w-full max-w-sm p-10 space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-3xl font-black italic tracking-tighter">AJUSTES</h2>
                    <button onclick="app.closeModal('settings-modal')" class="p-3 glass"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-3">
                    <button onclick="app.showExerciseManager()" class="w-full p-5 glass flex items-center gap-4 text-xs font-black uppercase active:bg-white/5">
                        <i data-lucide="library" class="w-5 h-5 text-gray-400"></i> Gerenciar Biblioteca
                    </button>
                    <button onclick="app.exportData()" class="w-full p-5 glass flex items-center gap-4 text-xs font-black uppercase active:bg-white/5">
                        <i data-lucide="database" class="w-5 h-5 text-[#00ff41]"></i> Exportar Backup
                    </button>
                    <button onclick="app.importDataTrigger()" class="w-full p-5 glass flex items-center gap-4 text-xs font-black uppercase active:bg-white/5">
                        <i data-lucide="refresh-cw" class="w-5 h-5 text-[#00ff41]"></i> Importar Backup
                    </button>
                    <input type="file" id="import-input" class="hidden" accept=".json" onchange="app.importData(event)">
                    <button onclick="app.clearAllData()" class="w-full p-5 glass text-red-500 text-[10px] font-black uppercase tracking-widest border-red-500/10 active:bg-red-500/10">Limpar todo o App</button>
                </div>
                <p class="text-[9px] text-center text-gray-700 font-bold tracking-[0.4em]">STRONGLOG PRO PWA v4.2</p>
            </div>
        </div>
    </div>

    <!-- Rest Overlay -->
    <div id="rest-timer-overlay" class="fixed top-24 right-6 translate-x-[200%] transition-transform duration-500 glass p-6 flex items-center gap-6 z-[200] shadow-2xl border-[#00ff41]/20">
        <div class="flex flex-col">
            <span class="text-[9px] text-[#00ff41] font-black uppercase tracking-[0.2em]">Descanso</span>
            <div class="text-4xl font-mono font-black italic text-white" id="overlay-timer">01:30</div>
        </div>
        <button onclick="app.stopRestTimer()" class="text-red-500 glass p-4 active:bg-red-500/10"><i data-lucide="circle-stop" class="w-6 h-6"></i></button>
    </div>

    <script>
        // PWA Service Worker Registration with Enhanced Update Logic
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' }).then(reg => {
                    console.log('[App] SW registrado com sucesso');
                    
                    // Verifica atualizações periodicamente
                    setInterval(() => { reg.update(); }, 60 * 60 * 1000); // A cada hora

                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[App] Nova versão detectada!');
                                document.getElementById('update-toast').classList.remove('hidden');
                            }
                        });
                    });
                }).catch(err => console.error('[App] Erro ao registrar SW:', err));
            });
        }

        const db = new Dexie("StrongLog_v4_Pro");
        db.version(1).stores({ plans: '++id, name', sessions: '++id, planName, date', templates: '++id, name, muscleGroup' });

        const app = {
            activeWorkout: null, timerInterval: null, startTime: null, restTimerInterval: null, editingPlan: null, libraryContext: null,
            exerciseTemplates: [
                { name: 'Supino Reto (Barra)', muscleGroup: 'Peito' }, { name: 'Supino Inclinado (Halter)', muscleGroup: 'Peito' },
                { name: 'Puxada Aberta', muscleGroup: 'Costas' }, { name: 'Remada Unilateral', muscleGroup: 'Costas' },
                { name: 'Agachamento Livre', muscleGroup: 'Pernas' }, { name: 'Leg Press 45', muscleGroup: 'Pernas' },
                { name: 'Desenvolvimento Militar', muscleGroup: 'Ombros' }, { name: 'Elevação Lateral', muscleGroup: 'Ombros' },
                { name: 'Rosca Martelo', muscleGroup: 'Bíceps' }, { name: 'Tríceps Testa', muscleGroup: 'Tríceps' }
            ],

            init: async () => {
                app.updateDate();
                await app.seedTemplates();
                await app.renderPlans();
                await app.renderHistory();
                app.initCharts();
                lucide.createIcons();
            },

            // Security: Sanitization (Frontend-Security Skill)
            sanitize: (str) => {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            updateDate: () => {
                document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
            },

            seedTemplates: async () => {
                const count = await db.templates.count();
                if (count === 0) await db.templates.bulkAdd(app.exerciseTemplates);
            },

            setView: (view) => {
                document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`view-${view}`).classList.remove('hidden');
                document.querySelectorAll('.nav-item').forEach(i => {
                    i.classList.remove('active');
                    if(i.dataset.view === view) i.classList.add('active');
                });
                window.scrollTo(0,0);
                lucide.createIcons();
            },

            showCustomExerciseForm: () => {
                const name = prompt('Nome do Exercício:');
                const group = prompt('Grupo Muscular (Peito, Costas, etc):');
                if(name && group) app.saveCustomExercise(name, group);
            },

            saveCustomExercise: async (name, muscleGroup) => {
                await db.templates.add({ name: app.sanitize(name), muscleGroup: app.sanitize(muscleGroup) });
                app.filterExerciseLibrary();
            },

            deleteTemplate: async (id) => {
                if(confirm('Apagar exercício da biblioteca?')) {
                    await db.templates.delete(id);
                    app.filterExerciseLibrary();
                }
            },

            showExerciseManager: () => {
                app.libraryContext = 'manager';
                app.showExerciseLibrary('manager');
            },

            renderPlans: async () => {
                const plans = await db.plans.toArray();
                const list = document.getElementById('workout-list');
                list.innerHTML = plans.length ? plans.map(p => `
                    <div class="glass p-6 flex justify-between items-center active:scale-[0.98] transition-all animate-fade bg-white/[0.01]">
                        <div class="flex-1 cursor-pointer" onclick="app.startWorkout(${p.id})">
                            <h3 class="font-black text-xl tracking-tighter italic uppercase text-white">${app.sanitize(p.name)}</h3>
                            <p class="text-[9px] text-gray-600 font-black uppercase tracking-[0.2em] mt-1">${p.exercises.length} EXERCÍCIOS</p>
                        </div>
                        <button onclick="app.showPlanEditor(${p.id})" class="p-3 glass text-gray-500 active:text-[#00ff41]"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                    </div>
                `).join('') : `<div class="glass p-12 text-center text-gray-700 font-black uppercase text-[10px] tracking-[0.3em]">Nenhuma rotina ativa</div>`;
                lucide.createIcons();
            },

            showPlanEditor: async (id = null) => {
                app.editingPlan = id ? await db.plans.get(id) : { name: '', exercises: [] };
                document.getElementById('plan-editor-title').innerText = id ? 'Ajustar Rotina' : 'Criar Rotina';
                document.getElementById('plan-name-input').value = app.editingPlan.name;
                app.renderEditorExercises();
                app.setView('plan-editor');
            },

            renderEditorExercises: () => {
                const list = document.getElementById('selected-exercises-list');
                list.innerHTML = app.editingPlan.exercises.map((ex, i) => `
                    <div class="glass p-5 flex justify-between items-center animate-fade bg-white/[0.01]">
                        <span class="font-black text-xs uppercase tracking-tight text-gray-300">${app.sanitize(ex)}</span>
                        <button onclick="app.editingPlan.exercises.splice(${i},1); app.renderEditorExercises()" class="text-red-500/40 p-1"><i data-lucide="minus-circle" class="w-5 h-5"></i></button>
                    </div>
                `).join('');
                lucide.createIcons();
            },

            savePlan: async () => {
                const name = document.getElementById('plan-name-input').value;
                if (!name || !app.editingPlan.exercises.length) return;
                app.editingPlan.name = name;
                await db.plans.put(app.editingPlan);
                app.setView('dashboard');
                app.renderPlans();
            },

            startWorkout: async (planId) => {
                const plan = await db.plans.get(planId);
                const workoutExercises = [];
                for(let name of plan.exercises) {
                    const lastData = await app.getExerciseHistory(name);
                    workoutExercises.push({
                        name: name, restTime: 90,
                        historyPreview: lastData ? `${lastData.weight}kg x ${lastData.reps}` : 'Novo Desafio',
                        sets: [{ weight: lastData ? lastData.weight : 0, reps: lastData ? lastData.reps : 0, completed: false, type: 'Normal', rpe: '' }]
                    });
                }
                app.activeWorkout = { ...plan, startTime: Date.now(), exercises: workoutExercises };
                document.getElementById('active-workout-name').innerText = plan.name;
                app.renderWorkout();
                app.setView('active-workout');
                app.startTimer();
            },

            getExerciseHistory: async (exName) => {
                const sessions = await db.sessions.orderBy('date').reverse().toArray();
                for(let s of sessions) {
                    const ex = s.exercises.find(e => e.name === exName);
                    if(ex) {
                        const best = [...ex.sets].filter(x => x.completed).sort((a,b) => (b.weight*b.reps) - (a.weight*a.reps))[0];
                        if(best) return best;
                    }
                }
                return null;
            },

            renderWorkout: () => {
                const list = document.getElementById('exercise-list');
                list.innerHTML = app.activeWorkout.exercises.map((ex, exIdx) => `
                    <div class="glass p-6 space-y-5 animate-fade">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-black text-[#00ff41] uppercase tracking-tighter text-lg italic leading-tight">${app.sanitize(ex.name)}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <div class="text-[9px] font-black text-gray-600 uppercase tracking-widest">Base: ${ex.historyPreview}</div>
                                    <div class="text-[9px] font-black text-[#00ff41]/40 uppercase tracking-widest cursor-pointer" onclick="app.setRest(${exIdx})">Descanso: ${ex.restTime}s</div>
                                </div>
                            </div>
                            <button onclick="app.removeExerciseFromWorkout(${exIdx})" class="p-2 text-gray-800 active:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="space-y-3">${ex.sets.map((s, sIdx) => app.renderSetRow(exIdx, sIdx, s)).join('')}</div>
                        <button onclick="app.addSetToWorkout(${exIdx})" class="w-full py-4 bg-white/5 rounded-2xl text-[9px] font-black tracking-[0.3em] text-gray-600 active:bg-white/10 uppercase">+ Add Série</button>
                    </div>
                `).join('');
                lucide.createIcons();
            },

            renderSetRow: (exI, sI, s) => `
                <div class="flex items-center gap-3 ${s.completed ? 'opacity-20 grayscale' : ''} transition-all">
                    <button onclick="app.cycleSetType(${exI},${sI})" class="w-10 h-10 flex items-center justify-center glass text-[10px] font-black text-[#00ff41] uppercase italic">${s.type[0]}</button>
                    <div class="flex-1 grid grid-cols-3 gap-2 h-12">
                        <div class="flex items-center glass px-1"><input onchange="app.updateSet(${exI},${sI},'weight',this.value)" type="number" inputmode="decimal" value="${s.weight}" class="w-full text-center text-sm font-black focus:outline-none text-white"></div>
                        <div class="flex items-center glass px-1"><input onchange="app.updateSet(${exI},${sI},'reps',this.value)" type="number" inputmode="numeric" value="${s.reps}" class="w-full text-center text-sm font-black focus:outline-none text-white"></div>
                        <div class="flex items-center glass px-1 bg-white/[0.01]"><input onchange="app.updateSet(${exI},${sI},'rpe',this.value)" type="number" inputmode="numeric" value="${s.rpe}" class="w-full text-center text-[10px] font-black text-gray-600 focus:outline-none" placeholder="RPE"></div>
                    </div>
                    <button onclick="app.toggleSet(${exI},${sI})" class="p-3.5 glass ${s.completed ? 'bg-[#00ff41]/20 border-[#00ff41]' : 'active:scale-90'}">
                        <i data-lucide="check" class="w-5 h-5 ${s.completed ? 'text-[#00ff41]' : 'text-gray-800'}"></i>
                    </button>
                </div>
            `,

            setRest: (idx) => {
                const t = prompt('Descanso (segundos):', app.activeWorkout.exercises[idx].restTime);
                if(t) app.activeWorkout.exercises[idx].restTime = parseInt(t);
                app.renderWorkout();
            },

            updateSet: (exI, sI, f, v) => { app.activeWorkout.exercises[exI].sets[sI][f] = parseFloat(v) || v; },
            cycleSetType: (exI, sI) => { 
                const types = ['Normal', 'Warmup', 'Failure', 'Drop'];
                const cur = app.activeWorkout.exercises[exI].sets[sI].type;
                app.activeWorkout.exercises[exI].sets[sI].type = types[(types.indexOf(cur) + 1) % types.length];
                app.renderWorkout();
            },
            toggleSet: (exI, sI) => {
                const s = app.activeWorkout.exercises[exI].sets[sI];
                s.completed = !s.completed;
                if(s.completed) { 
                    app.startRestTimer(app.activeWorkout.exercises[exI].restTime); 
                    if(navigator.vibrate) navigator.vibrate(40); // Haptic feedback
                }
                app.renderWorkout();
            },
            addSetToWorkout: (exI) => { 
                const sets = app.activeWorkout.exercises[exI].sets;
                sets.push({...sets[sets.length-1], completed: false}); 
                app.renderWorkout(); 
            },
            addExerciseToActiveWorkout: async (n) => { 
                const lastData = await app.getExerciseHistory(n);
                app.activeWorkout.exercises.push({
                    name: n, restTime: 90, historyPreview: lastData ? `${lastData.weight}kg x ${lastData.reps}` : 'Novo',
                    sets: [{ weight: lastData ? lastData.weight : 0, reps: lastData ? lastData.reps : 0, completed: false, type: 'Normal', rpe: '' }]
                }); 
                app.renderWorkout(); 
            },
            removeExerciseFromWorkout: (i) => { if(confirm('Remover?')) { app.activeWorkout.exercises.splice(i,1); app.renderWorkout(); } },
            cancelWorkout: () => { if(confirm('Descartar treino?')) { clearInterval(app.timerInterval); app.activeWorkout = null; app.setView('dashboard'); } },
            
            finishWorkout: async () => {
                clearInterval(app.timerInterval);
                let vol = 0;
                app.activeWorkout.exercises.forEach(e => e.sets.forEach(s => { if(s.completed) vol += (s.weight * s.reps); }));
                await db.sessions.add({ planName: app.activeWorkout.name, date: new Date(), duration: Math.floor((Date.now()-app.startTime)/1000), volume: vol, exercises: app.activeWorkout.exercises });
                app.activeWorkout = null; app.setView('dashboard'); app.renderHistory(); app.initCharts();
            },

            showExerciseLibrary: (ctx) => { app.libraryContext = ctx; app.filterExerciseLibrary(); document.getElementById('exercise-library-modal').classList.remove('hidden'); },
            filterExerciseLibrary: async () => {
                const s = document.getElementById('search-exercise').value.toLowerCase();
                const t = await db.templates.toArray();
                const groups = {};
                t.filter(x => x.name.toLowerCase().includes(s)).forEach(x => {
                    if(!groups[x.muscleGroup]) groups[x.muscleGroup] = [];
                    groups[x.muscleGroup].push(x);
                });
                document.getElementById('library-list').innerHTML = Object.keys(groups).sort().map(g => `
                    <div class="pt-6 pb-2 text-[10px] font-black text-gray-700 uppercase tracking-[0.4em] ml-2">${g}</div>
                    ${groups[g].map(x => `
                        <div class="w-full glass p-5 flex justify-between items-center bg-white/[0.01]">
                            <div class="flex-1 cursor-pointer" onclick="app.selectExercise('${x.name}')">
                                <div class="font-black text-sm uppercase tracking-tight text-white">${app.sanitize(x.name)}</div>
                            </div>
                            ${app.libraryContext === 'manager' ? `<button onclick="app.deleteTemplate(${x.id})" class="p-2 text-red-900"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : `<i data-lucide="plus" class="w-4 h-4 text-gray-800"></i>`}
                        </div>
                    `).join('')}
                `).join('');
                lucide.createIcons();
            },
            selectExercise: (n) => {
                if(app.libraryContext === 'editor') { app.editingPlan.exercises.push(n); app.renderEditorExercises(); }
                else if(app.libraryContext === 'workout') { app.addExerciseToActiveWorkout(n); }
                app.closeModal('exercise-library-modal');
            },

            startTimer: () => {
                app.startTime = Date.now();
                if(app.timerInterval) clearInterval(app.timerInterval);
                app.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now()-app.startTime)/1000);
                    document.getElementById('timer-display').innerText = new Date(elapsed * 1000).toISOString().substr(11, 8);
                }, 1000);
            },
            startRestTimer: (s) => {
                clearInterval(app.restTimerInterval);
                const overlay = document.getElementById('rest-timer-overlay');
                overlay.classList.remove('translate-x-[200%]');
                let rem = s;
                app.restTimerInterval = setInterval(() => {
                    rem--;
                    document.getElementById('overlay-timer').innerText = app.formatSec(rem);
                    if(rem <= 0) { 
                        app.stopRestTimer(); 
                        if(navigator.vibrate) navigator.vibrate([150, 80, 150]); 
                        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                        audio.play().catch(()=>{});
                    }
                }, 1000);
            },
            stopRestTimer: () => { clearInterval(app.restTimerInterval); document.getElementById('rest-timer-overlay').classList.add('translate-x-[200%]'); },
            formatSec: (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`,
            toggleSettings: () => document.getElementById('settings-modal').classList.toggle('hidden'),
            closeModal: (id) => document.getElementById(id).classList.add('hidden'),
            exportData: async () => {
                const blob = new Blob([JSON.stringify({ plans: await db.plans.toArray(), sessions: await db.sessions.toArray(), templates: await db.templates.toArray() }, null, 2)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `stronglog-pro-backup.json`; a.click();
            },
            importDataTrigger: () => document.getElementById('import-input').click(),
            importData: (ev) => {
                const f = ev.target.files[0]; if(!f) return;
                const r = new FileReader(); r.onload = async (e) => {
                    const d = JSON.parse(e.target.result);
                    if(d.plans) await db.plans.bulkPut(d.plans); if(d.sessions) await db.sessions.bulkPut(d.sessions); if(d.templates) await db.templates.bulkPut(d.templates);
                    location.reload();
                }; r.readAsText(f);
            },
            clearAllData: async () => { if(confirm('Apagar tudo?')) { await db.delete(); location.reload(); } },

            renderHistory: async () => {
                const h = await db.sessions.orderBy('date').reverse().toArray();
                document.getElementById('history-list').innerHTML = h.map(s => `
                    <div class="glass p-6 flex justify-between items-center bg-white/[0.01]">
                        <div class="space-y-1">
                            <div class="text-[9px] text-gray-700 font-black uppercase tracking-widest">${new Date(s.date).toLocaleDateString('pt-BR')}</div>
                            <div class="font-black text-sm uppercase text-white italic">${app.sanitize(s.planName)}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-black text-[#00ff41] italic tracking-tighter">${s.volume.toLocaleString()}<span class="text-[10px] text-gray-700 not-italic ml-1">KG</span></div>
                            <div class="text-[9px] text-gray-700 font-black uppercase">${Math.floor(s.duration/60)} MIN</div>
                        </div>
                    </div>
                `).join('');
            },

            initCharts: async () => {
                const s = await db.sessions.orderBy('date').reverse().limit(7).toArray();
                const sessions = s.reverse();
                const ctx = document.getElementById('volumeChart').getContext('2d');
                if(window.myChart) window.myChart.destroy();
                document.getElementById('weekly-total').innerText = sessions.reduce((a,b)=>a+b.volume,0).toLocaleString() + ' kg';
                window.myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: sessions.map(x => new Date(x.date).toLocaleDateString('pt-BR', {day:'numeric', month:'short'})),
                        datasets: [{ data: sessions.map(x => x.volume), backgroundColor: '#00ff41', borderRadius: 12, barThickness: 10 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#444', font: { size: 8, weight: '900' } } } } }
                });
            }
        };
        window.addEventListener('load', app.init);
    </script>
</body>
</html>
